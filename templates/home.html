<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity Dashboard</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    >
    <style>
        :root {
            --bg1: #e9f2ff;
            --bg2: #f7fbff;
        }
        [data-theme="dark"] {
            --bg1: #0b1220;
            --bg2: #111827;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top right, var(--bg1), var(--bg2) 60%);
        }
        .hero-card {
            border: 0;
            border-radius: 20px;
            box-shadow: 0 14px 35px rgba(19, 52, 104, 0.12);
        }
        [data-theme="dark"] .hero-card {
            background: #111827;
            color: #e5e7eb;
            box-shadow: 0 14px 35px rgba(2, 6, 23, 0.45);
        }
        [data-theme="dark"] .text-secondary {
            color: #9ca3af !important;
        }
        [data-theme="dark"] .navbar,
        [data-theme="dark"] footer {
            background-color: #111827 !important;
            border-color: #27354f !important;
        }
        [data-theme="dark"] .navbar-brand,
        [data-theme="dark"] .nav-link {
            color: #e5e7eb !important;
        }
        .brand-pill {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: linear-gradient(135deg, #175cd3, #0ea5e9);
            color: #fff;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="d-flex flex-column">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'home' %}">Opportunity Dashboard</a>
            <div class="navbar-nav ms-auto flex-row gap-3">
                <a class="nav-link" href="{% url 'home' %}">Home</a>
                <a class="nav-link" href="{% url 'opportunities:opportunity-list' %}">Opportunities</a>
                <a class="nav-link" href="{% url 'opportunities:saved-opportunities' %}">Saved</a>
                <button id="theme-toggle" class="btn btn-sm btn-outline-secondary ms-2" type="button">
                    <i class="bi bi-moon-stars"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <section class="card hero-card p-4 p-md-5 text-center w-100" style="max-width: 760px;">
            <div class="brand-pill mx-auto mb-3">OD</div>
            <h1 class="display-6 fw-semibold mb-3">Smart Opportunity Dashboard</h1>
            <p class="lead text-secondary mb-4">
                Track internships, fellowships, scholarships, and research opportunities from India and global sources in one place.
            </p>
            <div class="d-flex flex-wrap justify-content-center gap-2">
                <a class="btn btn-primary px-4" href="{% url 'opportunities:opportunity-list' %}">Explore Opportunities</a>
                <a id="refresh-btn" class="btn btn-outline-primary px-4" href="{% url 'opportunities:scrape-iit' %}">
                    <span class="spinner-border spinner-border-sm me-2 d-none" role="status" aria-hidden="true"></span>
                    Refresh Opportunities
                </a>
            </div>
        </section>
    </main>

    <footer class="border-top bg-white py-3">
        <div class="container text-center text-secondary small">
            Opportunity Dashboard &copy; {% now "Y" %}
        </div>
    </footer>
    <script>
        (function () {
            var root = document.documentElement;
            var themeToggle = document.getElementById("theme-toggle");
            var refreshBtn = document.getElementById("refresh-btn");

            function applyTheme(theme) {
                if (theme === "dark") {
                    root.setAttribute("data-theme", "dark");
                    if (themeToggle) {
                        themeToggle.innerHTML = '<i class="bi bi-sun"></i>';
                    }
                } else {
                    root.removeAttribute("data-theme");
                    if (themeToggle) {
                        themeToggle.innerHTML = '<i class="bi bi-moon-stars"></i>';
                    }
                }
            }

            var savedTheme = localStorage.getItem("od_theme");
            applyTheme(savedTheme === "dark" ? "dark" : "light");
            if (themeToggle) {
                themeToggle.addEventListener("click", function () {
                    var nextTheme = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
                    localStorage.setItem("od_theme", nextTheme);
                    applyTheme(nextTheme);
                });
            }

            if (refreshBtn) {
                refreshBtn.addEventListener("click", function () {
                    var spinner = refreshBtn.querySelector(".spinner-border");
                    if (spinner) {
                        spinner.classList.remove("d-none");
                    }
                    refreshBtn.classList.add("disabled");
                });
            }
        })();
    </script>
</body>
</html>
